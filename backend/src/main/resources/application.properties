# Server Configuration
server.port=8080

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/ai_multi_agent?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Settings (Secret key must be a 256-bit or greater hex string)
app.jwt.secret=9a4f2c8d3b7a1e5f8c3d9a6b2c4d8e1f5a7b3c9d0e2f4a6b8c0d2e4f6a8b0c2d
app.jwt.expiration-ms=86400000

# Gemini AI API configurations
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

# Enable SQL script initialization if tables are empty
spring.sql.init.mode=never

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.multiagent.codeassistant=DEBUG
