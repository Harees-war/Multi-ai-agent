<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request History - AgenticCode</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/history.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="animated-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar glass-panel">
            <div class="sidebar-logo">
                <i class="fa-solid fa-brain"></i> AgenticCode
            </div>
            
            <ul class="sidebar-menu">
                <li class="sidebar-menu-item">
                    <a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                </li>
                <li class="sidebar-menu-item">
                    <a href="generate.html"><i class="fa-solid fa-code"></i> Code Generator</a>
                </li>
                <li class="sidebar-menu-item">
                    <a href="review.html"><i class="fa-solid fa-shield-halved"></i> Code Reviewer</a>
                </li>
                <li class="sidebar-menu-item">
                    <a href="explain.html"><i class="fa-solid fa-book"></i> Code Explainer</a>
                </li>
                <li class="sidebar-menu-item active">
                    <a href="history.html"><i class="fa-solid fa-clock-rotate-left"></i> History</a>
                </li>
                <li class="sidebar-menu-item">
                    <a href="profile.html"><i class="fa-solid fa-user"></i> Profile</a>
                </li>
                <li class="sidebar-menu-item">
                    <a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a>
                </li>
            </ul>

            <ul class="sidebar-menu" style="margin-top: auto;">
                <li class="sidebar-menu-item">
                    <a href="#" onclick="auth.logout()"><i class="fa-solid fa-right-from-bracket" style="color: #ff4757;"></i> Log Out</a>
                </li>
            </ul>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Top Navbar -->
            <header class="top-navbar glass-panel">
                <div class="page-title-area">
                    <h2 style="font-size: 1.25rem; font-weight: 700;">Request History</h2>
                    <p style="font-size: 0.8rem; color: var(--text-muted);">Review past AI generations and logs</p>
                </div>
                
                <div class="nav-actions">
                    <button class="icon-btn" onclick="theme.toggle()" title="Toggle Dark/Light Mode">
                        <i class="fa-solid fa-circle-half-stroke"></i>
                    </button>
                    <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ffffff'><rect width='24' height='24' fill='%233a3f58'/><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/></svg>" alt="Profile" class="user-avatar">
                </div>
            </header>

            <!-- History Main Table View -->
            <section class="glass-card" style="padding: 24px; display: flex; flex-direction: column; gap: 20px;">
                <div class="history-controls">
                    <div class="search-wrapper">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="search-input" class="glass-input" placeholder="Search by language, agent, prompt...">
                    </div>
                </div>

                <div class="history-table-container">
                    <table class="history-table">
                        <thead>
                            <tr>
                                <th>Date & Time</th>
                                <th>Agent Used</th>
                                <th>Language</th>
                                <th>Prompt Preview</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="history-table-body">
                            <!-- Filled dynamically by history.js -->
                        </tbody>
                    </table>
                </div>

                <!-- Pagination Footer -->
                <div class="pagination">
                    <button id="prev-page-btn" class="page-btn"><i class="fa-solid fa-chevron-left"></i> Previous</button>
                    <span id="page-info" class="page-info">Page 1 of 1</span>
                    <button id="next-page-btn" class="page-btn">Next <i class="fa-solid fa-chevron-right"></i></button>
                </div>
            </section>
        </main>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/history.js"></script>
</body>
</html>
